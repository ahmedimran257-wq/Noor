# ============================================================
# Supabase Project Configuration — NOOR
# ============================================================

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
# profile-photos bucket is created via Supabase Dashboard or CLI:
# supabase storage create profile-photos --public=false

[auth]
enabled = true
port = 54321
site_url = "noor://"
additional_redirect_urls = ["https://noor.app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.sms]
# We use Firebase Auth for OTP — Supabase SMS is not used
enabled = false

[realtime]
enabled = true
# Broadcast channels used for chat (match:{match_id})
# Presence channels used for online indicator (future Phase 2)

[functions]
# Edge Functions are in supabase/functions/
# Deploy all with: supabase functions deploy
